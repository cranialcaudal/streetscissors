services:
  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      # Database path inside the container (mounted volume)
      - DATABASE_PATH=/data/street_scissors_prod.db
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=streetscissors.com
      - PORT=4000
    volumes:
      # Persist SQLite database
      - sqlite_data:/data
    networks:
      - caddy_net

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - caddy_net

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:

networks:
  caddy_net:
